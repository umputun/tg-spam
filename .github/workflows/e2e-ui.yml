name: e2e-ui

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "lib/**"
      - "e2e-ui/**"
      - ".github/workflows/e2e-ui.yml"
  pull_request:
    paths:
      - "app/**"
      - "lib/**"
      - "e2e-ui/**"
      - ".github/workflows/e2e-ui.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_GO_VERSION: v0.6100.0 # keep in sync with mxschmitt/playwright-go in go.mod

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: cache playwright browsers and driver
        uses: actions/cache@v5
        id: playwright-cache
        with:
          # the go driver (node + playwright-core) lives beside the browser binaries
          path: |
            ~/.cache/ms-playwright
            ~/.cache/ms-playwright-go
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_GO_VERSION }}-${{ hashFiles('go.sum') }}

      - name: install playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: go run github.com/mxschmitt/playwright-go/cmd/playwright@${{ env.PLAYWRIGHT_GO_VERSION }} install --with-deps chromium

      - name: install playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: go run github.com/mxschmitt/playwright-go/cmd/playwright@${{ env.PLAYWRIGHT_GO_VERSION }} install-deps chromium

      - name: run e2e ui tests
        run: go test -v -count=1 -timeout=5m -tags=e2e ./e2e-ui/...
